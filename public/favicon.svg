<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Terminal window chrome -->
  <rect x="10" y="16" width="44" height="34" rx="4" ry="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <!-- Terminal dots -->
  <circle cx="17" cy="21" r="2" fill="#ef4444"/>
  <circle cx="24" cy="21" r="2" fill="#f59e0b"/>
  <circle cx="31" cy="21" r="2" fill="#22c55e"/>
  <!-- Prompt cursor line 1 -->
  <text x="14" y="33" font-family="monospace" font-size="8" fill="#34d399" font-weight="bold">$</text>
  <rect x="21" y="28" width="18" height="2" rx="1" fill="url(#glow)" opacity="0.9"/>
  <!-- Prompt cursor line 2 -->
  <text x="14" y="42" font-family="monospace" font-size="8" fill="#34d399" font-weight="bold">&gt;</text>
  <rect x="21" y="37" width="12" height="2" rx="1" fill="url(#glow)" opacity="0.7"/>
  <!-- Blinking cursor -->
  <rect x="35" y="37" width="5" height="2" rx="1" fill="#34d399" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- AI sparkle -->
  <circle cx="50" cy="12" r="4" fill="url(#glow)" opacity="0.8"/>
  <path d="M50 6 L51.5 10 L55.5 10 L52.5 12.5 L53.5 16.5 L50 14 L46.5 16.5 L47.5 12.5 L44.5 10 L48.5 10 Z" fill="url(#glow)" opacity="0.6" transform="scale(0.6) translate(34, 3)"/>
</svg>